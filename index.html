<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain AI Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #e5ddd5; }
        .header { background: #075e54; color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        #chatBox { height: calc(100vh - 140px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 16px; line-height: 1.4; position: relative; }
        .user-msg { align-self: flex-end; background: #dcf8c6; border-top-right-radius: 2px; }
        .ai-msg { align-self: flex-start; background: white; border-top-left-radius: 2px; }
        .input-area { position: fixed; bottom: 0; width: 100%; background: #f0f0f0; padding: 10px; display: flex; align-items: center; gap: 8px; box-sizing: border-box; }
        .icon-btn { color: #555; font-size: 22px; cursor: pointer; padding: 5px; }
        .input-box { flex: 1; background: white; border-radius: 25px; padding: 5px 15px; display: flex; align-items: center; gap: 10px; min-height: 40px; }
        input { border: none; flex: 1; outline: none; font-size: 16px; background: transparent; }
        .mic-btn { background: #128c7e; color: white; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; }
    </style>
</head>
<body>
    <div class="header">Brain AI Pro - William</div>
    <div id="chatBox"><div class="msg ai-msg">Tayari William! Nawezaje kukusaidia sasa?</div></div>
    <div class="input-area">
        <i class="fas fa-plus icon-btn"></i>
        <div class="input-box">
            <i class="far fa-smile icon-btn"></i>
            <input type="text" id="userInput" placeholder="Andika ujumbe...">
            <i class="fas fa-camera icon-btn" onclick="document.getElementById('fileInput').click()"></i>
        </div>
        <button class="mic-btn" id="micBtn"><i class="fas fa-microphone"></i></button>
        <input type="file" id="fileInput" hidden accept="image/*">
    </div>
    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const micBtn = document.getElementById('micBtn');

        async function sendMsg(text) {
            chatBox.innerHTML += `<div class="msg user-msg">${text}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            const data = await response.json();
            chatBox.innerHTML += `<div class="msg ai-msg">${data.response}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && userInput.value.trim() !== "") {
                sendMsg(userInput.value);
                userInput.value = "";
            }
        });

        if ('webkitSpeechRecognition' in window) {
            const recognition = new webkitSpeechRecognition();
            recognition.lang = 'sw-TZ';
            micBtn.onclick = () => { recognition.start(); micBtn.style.background = "red"; };
            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                micBtn.style.background = "#128c7e";
                sendMsg(text);
            };
            recognition.onerror = () => { micBtn.style.background = "#128c7e"; };
        }
    </script>
</body>
                                          </html>
